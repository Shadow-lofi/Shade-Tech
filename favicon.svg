<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ShadeTech">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#1C1F2A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0.15" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#ffe488"/>
      <stop offset="0.5" stop-color="#d9b24a"/>
      <stop offset="1" stop-color="#a9781d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#c6a13a" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#c6a13a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark tile matching the site's #0A0A0F → #1C1F2A gradient -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- Hairline gold frame for a premium, framed feel -->
  <rect x="30" y="30" width="452" height="452" rx="90" fill="none" stroke="#c6a13a" stroke-opacity="0.38" stroke-width="3"/>

  <!-- Serif "S" monogram (Georgia echoes the site's Playfair headings) -->
  <text x="260" y="374" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="340" fill="#000000" fill-opacity="0.38">S</text>
  <text x="256" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="340" fill="url(#gold)">S</text>

  <!-- A small terminal cursor — a quiet nod to ShadeTech.dev -->
  <rect x="330" y="332" width="34" height="14" rx="4" fill="#ffdb4d"/>
</svg>
